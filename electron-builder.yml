appId: gg.mo3taz.mo3taz
productName: ꧁MO3TAZ꧂
directories:
  buildResources: build
  output: dist
icon: build/icon.ico
afterPack: scripts/after-pack.cjs
extraResources:
  - ludusavi
  - hydra-python-rpc
  - hydra-native
  - seeds
  - from: node_modules/create-desktop-shortcuts/src/windows.vbs
  - from: achievement.wav
  - from: resources/steam-os-theme.css
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!native/hydra-native/target"
  - "!native/hydra-native/target/**"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asarUnpack:
  - resources/**
  - node_modules/sharp/**
  - node_modules/@img/sharp-libvips-*/**
win:
  icon: build/icon.ico
  executableName: Mo3taz
  signAndEditExecutable: false
  extraResources:
    - from: binaries/7z.exe
    - from: binaries/7z.dll
  target:
    - nsis
    - portable
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: installer.nsh
portable:
  artifactName: ${name}-${version}-portable.${ext}
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extraResources:
    - from: binaries/7zz
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  extraResources:
    - from: binaries/7zzs
    - from: binaries/umu/umu-run
  target:
    - AppImage
    - snap
    - deb
    - rpm
  maintainer: electronjs.org
  category: Game
  mimeTypes:
    - x-scheme-handler/mo3tazlauncher
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: mo3taz
  repo: mo3taz
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
